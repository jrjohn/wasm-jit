[package]
name = "wasm-jit"
version = "0.1.0"
edition = "2021"
description = "PoC: runtime script→WASM codegen (let V8 JIT it) vs Rhai tree-walking interpretation"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
rhai = "1"
wasm-encoder = "0.252.0"
getrandom = { version = "0.3", features = ["wasm_js"] }

[profile.release]
opt-level = 3

[dev-dependencies]
wasmparser = "0.252.0"

[workspace]
members = [".", "leptos-poc"]
resolver = "2"
