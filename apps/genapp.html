<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>講一句,長出一個受圍籬 App · wasm-jit</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; margin: 0;
         background: #0d1117; color: #e6edf3; line-height: 1.5; padding: 1.6rem 1rem 3rem; }
  .wrap { max-width: 1040px; margin: 0 auto; }
  h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 .25rem; }
  .lede { font-size: .8rem; color: #8b949e; margin: 0 0 1rem; max-width: 80ch; }
  .lede b { color: #c9d1d9; font-weight: 600; } code { color: #a5d6ff; }
  .bar { display: flex; gap: .5rem; align-items: stretch; }
  #intent { flex: 1; font: inherit; font-size: .9rem; padding: .6rem .8rem; border-radius: 10px;
            border: 1px solid #30363d; background: #0b0f14; color: inherit; resize: vertical; min-height: 46px; }
  #intent:focus { outline: none; border-color: #58a6ff; box-shadow: 0 0 0 3px #58a6ff2b; }
  #go { font: inherit; font-size: .9rem; font-weight: 600; padding: 0 1.3rem; border-radius: 10px; border: 1px solid #58a6ff33;
        background: linear-gradient(180deg, #2a7bff, #1a63d8); color: #fff; cursor: pointer; white-space: nowrap; }
  #go:disabled { opacity: .5; cursor: wait; }
  .chips { display: flex; flex-wrap: wrap; gap: .4rem; margin: .6rem 0 0; }
  .chip { font-size: .74rem; padding: .28rem .7rem; border-radius: 999px; border: 1px solid #30363d;
          background: #161b22; color: #b9c2cc; cursor: pointer; }
  .chip:hover { border-color: #58a6ff66; color: #e6edf3; }
  .status { font-size: .8rem; color: #8b949e; margin: .8rem 0; min-height: 1.2em; }
  .status.err { color: #f85149; } .status.ok { color: #7ee787; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: start; }
  @media (max-width: 820px) { .cols { grid-template-columns: 1fr; } }
  .panel { border: 1px solid #30363d; border-radius: 14px; background: #0f141a; padding: 1.1rem 1.2rem; min-height: 200px; }
  .phead { font-size: .72rem; color: #6e7681; text-transform: uppercase; letter-spacing: .04em; margin: 0 0 .8rem; }
  /* grown-app widgets */
  .w-stack { display: flex; flex-direction: column; gap: .7rem; }
  .w-row { display: flex; gap: .8rem; align-items: center; flex-wrap: wrap; }
  .w-label { font-size: .9rem; color: #c9d1d9; margin: 0; }
  .w-stack > .w-label:first-child { font-size: 1.05rem; font-weight: 600; color: #e6edf3; }
  .w-value { font-size: .85rem; color: #8b949e; display: inline-flex; align-items: baseline; gap: .35rem;
             background: #58a6ff14; border: 1px solid #58a6ff26; border-radius: 999px; padding: .2rem .7rem; }
  .w-value b { color: #79b8ff; font-variant-numeric: tabular-nums; font-size: .95rem; }
  .w-input { font: inherit; font-size: .85rem; padding: .35rem .6rem; border-radius: 8px; border: 1px solid #30363d;
             background: #0d1117; color: inherit; width: 120px; font-variant-numeric: tabular-nums; text-align: right; }
  .w-input:focus { outline: none; border-color: #58a6ff; box-shadow: 0 0 0 3px #58a6ff2b; }
  .w-btn { font: inherit; font-size: .82rem; padding: .4rem .9rem; border-radius: 8px; border: 1px solid #58a6ff33;
           background: linear-gradient(180deg,#2a7bff,#1a63d8); color: #fff; cursor: pointer; }
  .w-slider { width: 200px; }
  /* evidence */
  .meta { font-size: .74rem; color: #8b949e; margin-bottom: .7rem; }
  .meta b { color: #c9d1d9; }
  .cell { border: 1px solid #21262d; border-radius: 8px; margin-bottom: .5rem; overflow: hidden; }
  .cell .ch { display: flex; justify-content: space-between; font-size: .72rem; padding: .35rem .6rem;
              background: #0b0f14; color: #d2a8ff; }
  .cell .ch .b { color: #6e7681; }
  .cell pre { margin: 0; padding: .5rem .6rem; font-size: .68rem; color: #a5d6ff; white-space: pre; overflow-x: auto; line-height: 1.4; }
  .fence { font-size: .72rem; color: #7ee787; margin-top: .6rem; }
  .fence code { color: #7ee787; }
  a { color: #58a6ff; }
</style>
</head>
<body>
<div class="wrap">
  <h1>講一句,長出一個受圍籬 App 🌱</h1>
  <p class="lede">你講「我願」→ <b>Claude 現生一份 cell 宣告</b> → server 端<b>編譯即圍籬</b>(編不過就把錯誤丟回去<b>自我修復</b>)→
    瀏覽器<b>當場把它跑成 App</b>。每個 cell 只碰得到 <code>get set sin cos ld sd</code>——想 <code>fetch</code>/碰網路就編譯期死。
    <b>你敢當場跑 AI 剛吐的東西,正因為它出不了圍籬。</b></p>

  <div class="bar">
    <textarea id="intent" placeholder="例如:一個 BMI 計算機,輸入身高(cm)和體重(kg),顯示 BMI"></textarea>
    <button id="go" disabled>長出來</button>
  </div>
  <div class="chips" id="chips"></div>
  <div class="status" id="status">載入編譯器…</div>

  <div class="cols">
    <div class="panel">
      <p class="phead">▸ 長出來的 App(活的,可互動)</p>
      <div id="stage"><span style="color:#6e7681;font-size:.8rem">還沒生成</span></div>
    </div>
    <div class="panel">
      <p class="phead">▸ 生成證據:AI 寫的 cell(受圍籬)</p>
      <div id="evidence"><span style="color:#6e7681;font-size:.8rem">生成後這裡會顯示 AI 寫的每一支 cell 原始碼 + 圍籬收據</span></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const fmt = n => (Math.round(n * 100) / 100).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const EXAMPLES = [
  'BMI 計算機:輸入身高 cm、體重 kg,顯示 BMI',
  '攝氏轉華氏,輸入攝氏溫度',
  '圓面積:輸入半徑,顯示面積與周長',
  '小費計算機:輸入帳單金額與人數,顯示每人應付(含 10% 服務費)',
  '複利試算:本金、年利率%、年數 → 期末金額',
];
$('chips').innerHTML = EXAMPLES.map(e => `<span class="chip">${e}</span>`).join('');
document.querySelectorAll('.chip').forEach((c, i) => c.onclick = () => { $('intent').value = EXAMPLES[i]; $('intent').focus(); });

function status(msg, cls) { const s = $('status'); s.textContent = msg; s.className = 'status' + (cls ? ' ' + cls : ''); }

let compileUiCell = null;

// ── 最小「受圍籬 UI runtime」:schema → 活的 App。cell 全編成 wasm,只跑在這 6 個函式的圍籬裡 ──
async function manifestUi(schema) {
  const slots = new Float64Array(32), coll = new Float64Array(4096);
  const wrap = i => ((i | 0) % 4096 + 4096) % 4096;
  const imports = { env: {
    sin: Math.sin, cos: Math.cos,
    get: i => slots[(i | 0) & 31], set: (i, v) => { slots[(i | 0) & 31] = v; },
    ld: i => coll[wrap(i)], sd: (i, v) => { coll[wrap(i)] = v; },
  } };
  const runFns = {}, fuels = {}, outputs = {};
  for (const c of (schema.cells || [])) {
    const bytes = compileUiCell(c.script);                 // 瀏覽器內編譯,失敗即拋(圍籬)
    const { instance } = await WebAssembly.instantiate(bytes, imports);
    runFns[c.id] = instance.exports.run; fuels[c.id] = instance.exports.fuel || null;
  }
  const wiresFrom = {};
  for (const w of (schema.wires || [])) (wiresFrom[w.from] = wiresFrom[w.from] || []).push(w.to);
  const binds = [], charts = [];
  let budget = 0;
  const run = (id, x) => { const f = runFns[id]; if (!f) return; if (fuels[id]) fuels[id].value = 200000; outputs[id] = f(x); };
  const fire = (id, x) => { if (budget-- <= 0) return; run(id, x); for (const to of (wiresFrom[id] || [])) fire(to, outputs[id] || 0); };
  const refresh = () => {
    for (const b of binds) { const v = outputs[b.id]; b.el.textContent = (v == null || Number.isNaN(v)) ? '—' : fmt(v); }
    for (const ch of charts) drawChart(ch, ch.slices.map(s => ({ label: s.label, value: outputs[s.bind] || 0, color: s.color })));
  };
  const act = (cellId, x) => { budget = 128; fire(cellId, x); refresh(); };

  const root = build(schema.tree, act, binds, charts);
  budget = 512;
  for (const it of (schema.init || [])) fire(it.cell, +it.arg || 0);
  // run every DISPLAYED cell once so bound values AND chart slices populate
  // (constant data cells like {"id":"usa","script":"320.0"} have no wires firing them)
  const shown = new Set([...binds.map(b => b.id), ...charts.flatMap(c => c.slices.map(s => s.bind)), ...(schema.wires || []).map(w => w.to)]);
  for (const id of shown) run(id, 0);
  refresh();
  return root;
}

function build(node, act, binds, charts) {
  if (!node || !node.type) return document.createTextNode('');
  const t = node.type;
  if (t === 'stack' || t === 'row') {
    const d = document.createElement('div'); d.className = t === 'row' ? 'w-row' : 'w-stack';
    (node.children || []).forEach(ch => d.appendChild(build(ch, act, binds, charts))); return d;
  }
  if (t === 'label') { const p = document.createElement('div'); p.className = 'w-label'; p.textContent = node.text || ''; return p; }
  if (t === 'value') {
    const w = document.createElement('span'); w.className = 'w-value';
    if (node.label) { const l = document.createElement('span'); l.textContent = node.label; w.appendChild(l); }
    const b = document.createElement('b'); b.textContent = '—'; w.appendChild(b);
    binds.push({ id: node.bind, el: b }); return w;
  }
  if (t === 'input') {
    const inp = document.createElement('input'); inp.type = 'number'; inp.className = 'w-input'; inp.placeholder = node.placeholder || '';
    const cell = (node.on_input || {}).cell; inp.addEventListener('input', () => act(cell, +inp.value || 0)); return inp;
  }
  if (t === 'button') {
    const b = document.createElement('button'); b.className = 'w-btn'; b.textContent = node.text || 'OK';
    const cell = (node.on_click || {}).cell; b.addEventListener('click', () => act(cell, 0)); return b;
  }
  if (t === 'slider') {
    const w = document.createElement('div'); w.className = 'w-row';
    if (node.label) { const l = document.createElement('span'); l.className = 'w-label'; l.textContent = node.label; w.appendChild(l); }
    const s = document.createElement('input'); s.type = 'range'; s.className = 'w-slider';
    s.min = node.min ?? 0; s.max = node.max ?? 100; s.step = node.step ?? 1; s.value = node.min ?? 0;
    const cell = (node.on_input || {}).cell; s.addEventListener('input', () => act(cell, +s.value)); w.appendChild(s); return w;
  }
  if (t === 'pie' || t === 'bar') {                 // NEW primitive: a chart the host draws from cell-bound slices
    const LW = 300, LH = 240, dpr = Math.min(2, window.devicePixelRatio || 1);
    const cv = document.createElement('canvas');
    cv.width = LW * dpr; cv.height = LH * dpr; cv.style.width = LW + 'px'; cv.style.height = LH + 'px';
    cv.getContext('2d').scale(dpr, dpr);
    const sls = (node.slices || []);
    const slices = sls.map((s, i) => ({ label: s.label || ('#' + i), bind: s.bind, color: s.color || `hsl(${Math.round(i / Math.max(1, sls.length) * 360)}, 72%, 60%)` }));
    charts.push({ cv, kind: t, slices, LW, LH });
    return cv;
  }
  const p = document.createElement('div'); p.className = 'w-label'; p.style.opacity = .5; p.textContent = '[' + t + ']'; return p;
}

// the host's chart primitive — a pie (文字內崁:label+% 落在每一瓣裡)or a bar, from slice values
function drawChart(ch, slices) {
  const ctx = ch.cv.getContext('2d'), W = ch.LW, H = ch.LH;
  ctx.clearRect(0, 0, W, H);
  const total = slices.reduce((a, s) => a + Math.max(0, s.value), 0) || 1;
  if (ch.kind === 'pie') {
    const cx = W * 0.42, cy = H / 2, R = Math.min(W * 0.38, H * 0.44);
    let a = -Math.PI / 2;
    for (const s of slices) {
      const frac = Math.max(0, s.value) / total, a2 = a + frac * 2 * Math.PI;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, R, a, a2); ctx.closePath();
      ctx.fillStyle = s.color; ctx.fill(); ctx.strokeStyle = '#0b0f14'; ctx.lineWidth = 2; ctx.stroke();
      if (frac > 0.04) {
        const m = (a + a2) / 2, lr = R * 0.6, lx = cx + lr * Math.cos(m), ly = cy + lr * Math.sin(m);
        ctx.fillStyle = '#fff'; ctx.font = '600 11px ui-monospace, monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(s.label, lx, ly - 6); ctx.fillText(Math.round(frac * 100) + '%', lx, ly + 7);
      }
      a = a2;
    }
    // legend on the right
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.font = '11px ui-monospace, monospace';
    let ly = H / 2 - slices.length * 8;
    for (const s of slices) { ctx.fillStyle = s.color; ctx.fillRect(W * 0.84, ly - 5, 10, 10); ctx.fillStyle = '#c9d1d9'; ctx.fillText(s.label, W * 0.84 + 15, ly); ly += 18; }
  } else {
    const n = slices.length, mL = 8, mB = 22, plotW = W - mL - 8, plotH = H - 16 - mB, base = H - mB;
    const max = Math.max(1, ...slices.map(s => s.value)), bw = plotW / n * 0.66;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.font = '10px ui-monospace, monospace';
    slices.forEach((s, i) => {
      const cx = mL + (i + 0.5) * plotW / n, h = Math.max(0, s.value) / max * plotH;
      ctx.fillStyle = s.color; ctx.fillRect(cx - bw / 2, base - h, bw, h);
      ctx.fillStyle = '#c9d1d9'; ctx.fillText(s.label, cx, base + 4);
      ctx.fillText(fmt(s.value), cx, base - h - 13);
    });
  }
}

function renderEvidence(data, dt) {
  const cells = (data.cells || []).map(c =>
    `<div class="cell"><div class="ch"><span>${c.id}</span><span class="b">${c.bytes} bytes wasm</span></div><pre>${c.script.replace(/</g, '&lt;')}</pre></div>`
  ).join('');
  $('evidence').innerHTML =
    `<div class="meta"><b>${data.schema.title || '(untitled)'}</b> · 第 <b>${data.attempt}</b> 次過關 · ${dt}s · ${(data.cells || []).length} 支 cell</div>` +
    cells +
    `<div class="fence">圍籬:每支 cell 只能 import <code>${(data.fence || []).join(', ')}</code> —— 想 fetch/碰網路,編譯期就死。</div>`;
}

async function gen() {
  const intent = $('intent').value.trim();
  if (!intent) { status('說一句話吧', 'err'); return; }
  $('go').disabled = true;
  status('🌱 生成中…(Claude 生 cell → 編譯即圍籬 → 自我修復,約 15–40s)');
  const t0 = performance.now();
  let data;
  try {
    const r = await fetch('/api/gen', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ intent }) });
    data = await r.json();
  } catch (e) { status('✗ 網路錯誤:' + e, 'err'); $('go').disabled = false; return; }
  const dt = ((performance.now() - t0) / 1000).toFixed(1);
  if (!data.ok) { status('✗ 生成失敗:' + (data.error || '?'), 'err'); $('go').disabled = false; return; }
  try {
    $('stage').innerHTML = '';
    $('stage').appendChild(await manifestUi(data.schema));
    renderEvidence(data, dt);
    status(`✓ 長出來了(${dt}s,第 ${data.attempt} 次過關)——去左邊玩玩它`, 'ok');
  } catch (e) { status('✗ 渲染錯誤:' + e, 'err'); console.error(e); }
  $('go').disabled = false;
}
$('go').onclick = gen;
$('intent').addEventListener('keydown', e => { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') gen(); });

(async () => {
  try {
    const mod = await import('/pkg/wasm_jit.js'); await mod.default();
    compileUiCell = mod.compile_ui_cell_wasm;
    $('go').disabled = false;
    status('編譯器就緒 · 講一句「我願」,或點下面的例子,然後按「長出來」（⌘/Ctrl+Enter 也行）');
  } catch (e) { status('✗ 需要 /pkg 編譯器:' + e, 'err'); }
})();
</script>
</body>
</html>
